source ~/.dotfiles-local/tmux.conf

# unbind some default keybindings
unbind C-b

# set prefix key to ctrl-q
set -g prefix M-s
bind M-s send-prefix

bind ';' command-prompt

# make 256 colors work
set -g default-terminal "screen-256color"
  
# start first window and pane at 1, not zero
set-option -g base-index 1
set-window-option -g pane-base-index 1

# bind r to reloading the config file
bind r source-file ~/.tmux.conf \; display "Reloaded tmux config file."

# binding vi-like copy & paste
setw -g mode-keys vi

unbind [
bind Escape copy-mode

unbind p
bind p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

unbind h
unbind l
unbind k

bind -r h previous-window
bind -r M-h previous-window
bind -r l next-window
bind -r M-l next-window
# Default window with two panes
bind -r k new-window \; split-window -h \; select-layout even-horizontal \; select-pane -t 1 \; resize-pane -x 90%
bind -r M-k new-window \; split-window -h \; select-layout even-horizontal \; select-pane -t 1 \; resize-pane -x 90%
# No extra panes
bind -r j new-window

# Go and zoom on pane 1 or 2, ...
bind -n M-1 select-pane -t 1 \; resize-pane -x 90%
bind -n M-2 select-pane -t 2 \; resize-pane -x 90%
bind -n M-3 select-pane -t 3 \; resize-pane -x 90%
# Back to even split
unbind '\'
bind '\' select-layout even-horizontal
bind M-'\' select-layout even-horizontal


# load version-specific mouse config
if-shell "[[ `tmux -V` == tmux\\ 1.? ]]" 'source-file ~/dotfiles/tmux-1x.conf'
if-shell "[[ `tmux -V` == tmux\\ 2.? ]]" 'source-file ~/dotfiles/tmux-2x.conf'
if-shell "[[ `tmux -V` == tmux\\ 3.* ]]" 'source-file ~/dotfiles/tmux-3x.conf'

# Layout options
# select-layout -g main-vertical # nice try, didn't work :-)
set-window-option -g main-pane-width 101
set-window-option -g display-panes-time 2500

# pane selection
bind ',' select-pane -L
bind '.' select-pane -R

# resize windows up as much as available :-)
set-window-option -g aggressive-resize on

# disabe window renaming
set-option -g allow-rename off

set-option -g history-limit 200000


